---
- name: Create {{ app_namespace }} namespace
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'namespace-app.yaml.j2') | from_yaml }}"

# --- Get Vault admin token ---

- name: Get Vault root token
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ vault_token_secret }}"
    namespace: "{{ vault_namespace }}"
  register: vault_token_result

- name: Set Vault token fact
  ansible.builtin.set_fact:
    vault_root_token: "{{ vault_token_result.resources[0].data.token | b64decode }}"

# --- Write secrets to Vault ---

- name: Write API secret to Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ vault_pod }}"
    command: >-
      sh -c "VAULT_TOKEN={{ vault_root_token }}
      vault kv put kv/{{ vault_secret_base_path }}/api
      api-key='{{ ph_api_key }}'"
  changed_when: true

- name: Write GitHub secret to Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ vault_pod }}"
    command: >-
      sh -c "VAULT_TOKEN={{ vault_root_token }}
      vault kv put kv/{{ vault_secret_base_path }}/github
      token='{{ github_token }}'
      oauth-client-id='{{ github_oauth_client_id }}'
      oauth-client-secret='{{ github_oauth_client_secret }}'"
  changed_when: true

- name: Write Jira secret to Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ vault_pod }}"
    command: >-
      sh -c "VAULT_TOKEN={{ vault_root_token }}
      vault kv put kv/{{ vault_secret_base_path }}/jira
      url='{{ jira_url }}'
      email='{{ jira_email }}'
      api-token='{{ jira_api_token }}'"
  changed_when: true

- name: Write LiteLLM secret to Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ vault_pod }}"
    command: >-
      sh -c "VAULT_TOKEN={{ vault_root_token }}
      vault kv put kv/{{ vault_secret_base_path }}/litellm
      api-key='{{ litellm_api_key }}'
      url='{{ litellm_api_url }}'"
  changed_when: true

- name: Write PH Internal AI secret to Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ vault_pod }}"
    command: >-
      sh -c "VAULT_TOKEN={{ vault_root_token }}
      vault kv put kv/{{ vault_secret_base_path }}/ph-internal-ai
      api-key='{{ ph_internal_ai_api_key }}'"
  changed_when: true

- name: Write RCARS secret to Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ vault_pod }}"
    command: >-
      sh -c "VAULT_TOKEN={{ vault_root_token }}
      vault kv put kv/{{ vault_secret_base_path }}/rcars
      url='{{ rcars_url }}'
      api-key='{{ rcars_api_key }}'"
  changed_when: true

- name: Write DevSpaces GitHub OAuth secret to Vault
  kubernetes.core.k8s_exec:
    namespace: "{{ vault_namespace }}"
    pod: "{{ vault_pod }}"
    command: >-
      sh -c "VAULT_TOKEN={{ vault_root_token }}
      vault kv put kv/{{ devspaces_vault_path }}/github
      client-id='{{ github_oauth_client_id }}'
      client-secret='{{ github_oauth_client_secret }}'"
  changed_when: true

# --- Ensure central-api Vault role and policy ---

- name: Create central-api-policy in Vault
  ansible.builtin.shell: |
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'rm -rf /tmp/central-api-policy.hcl'
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'echo "path \"kv/data/secrets/ph/central/projects/*\" {" > /tmp/central-api-policy.hcl'
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'echo "  capabilities = [\"create\", \"update\", \"read\", \"list\"]" >> /tmp/central-api-policy.hcl'
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'echo "}" >> /tmp/central-api-policy.hcl'
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'echo "path \"kv/metadata/secrets/ph/central/projects/*\" {" >> /tmp/central-api-policy.hcl'
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'echo "  capabilities = [\"create\", \"update\", \"read\", \"list\", \"delete\"]" >> /tmp/central-api-policy.hcl'
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'echo "}" >> /tmp/central-api-policy.hcl'
    oc exec vault-0 -n {{ vault_namespace }} -- bash -c 'VAULT_TOKEN={{ vault_root_token }} vault policy write central-api-policy /tmp/central-api-policy.hcl'
  changed_when: true

- name: Create central-api Kubernetes auth role in Vault
  ansible.builtin.shell: |
    oc exec vault-0 -n {{ vault_namespace }} -- sh -c "VAULT_TOKEN={{ vault_root_token }} vault write auth/kubernetes/role/central-api-role \
      bound_service_account_names=central-api \
      bound_service_account_namespaces={{ app_namespace }} \
      policies=central-api-policy \
      ttl=24h"
  changed_when: true

# --- Create single ExternalSecret in publishing-house namespace ---

- name: Create publishing-house-credentials ExternalSecret
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'externalsecret-publishing-house-credentials.yaml.j2') | from_yaml }}"

# --- Wait for ExternalSecret to sync ---

- name: Wait for ExternalSecret to sync
  kubernetes.core.k8s_info:
    api_version: external-secrets.io/v1beta1
    kind: ExternalSecret
    name: publishing-house-credentials
    namespace: "{{ app_namespace }}"
  register: external_secret
  until:
    - external_secret.resources | length > 0
    - external_secret.resources[0].status.conditions is defined
    - external_secret.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0
  retries: 12
  delay: 10

- name: Display Vault secrets summary
  ansible.builtin.debug:
    msg:
      - "Vault secrets populated at kv/{{ vault_secret_base_path }}/"
      - "ExternalSecret publishing-house-credentials created in {{ app_namespace }} with all keys"
