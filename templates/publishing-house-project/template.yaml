apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: publishing-house-project
  title: Publishing House Content Project
  description: Create a new PH content project with orchestrated workflow
  tags:
    - publishing-house
    - lab
    - devspaces

spec:
  owner: rhdp-team
  type: service

  parameters:
    - title: Project Details
      required:
        - project_name
        - project_description
        - content_type
        - deployment_mode
      properties:
        project_name:
          title: Project Name
          type: string
          description: Name for your lab/demo (letters and hyphens only)
          ui:autofocus: true
          ui:placeholder: "openshift-ai-workshop"
          pattern: '^[a-z0-9-]+$'
          ui:help: Use lowercase letters, numbers, and hyphens only

        project_description:
          title: Project Description
          type: string
          description: Brief overview of what this project will deliver
          ui:widget: textarea
          ui:options:
            rows: 3
          ui:placeholder: "A hands-on lab teaching developers how to deploy and manage AI workloads on OpenShift using RHOAI"

        content_type:
          title: Content Type
          type: string
          enum: [lab, demo]
          default: lab

        deployment_mode:
          title: Deployment Mode
          type: string
          enum:
            - rhdp_published
            - self_published
          enumNames:
            - RHDP Published (full gates, reviewer required)
            - Self-Published (self-approval allowed)
          default: rhdp_published
          ui:help: Choose review rigor level

        tags:
          title: Tags
          type: array
          ui:options:
            addable: true
            orderable: false
            removable: true
          items:
            type: string
            title: Tag
            ui:placeholder: "e.g. LB1234, openshift, ansible"
          ui:help: "e.g. LB1234, openshift, ansible"

    - title: GitHub Collaborators
      description: Enter your GitHub username first. You can also add collaborators who will have write access to the project repo.
      required:
        - github_users
      properties:
        github_users:
          title: GitHub Users
          type: array
          minItems: 1
          ui:help: "Your GitHub ID is required as the first entry. Additional collaborators are optional."
          ui:options:
            addable: true
            orderable: false
            removable: true
          items:
            type: object
            required:
              - user
            properties:
              user:
                title: GitHub Username
                type: string
                ui:placeholder: "your-github-id"
              access:
                title: Access
                type: string
                default: write
                ui:widget: hidden

    - title: Initiative & Content Format
      required:
        - initiative_key
        - showroom_type
      properties:
        initiative_key:
          title: Initiative
          type: string
          enum:
            - rh1_2027
            - summit_2027
            - none
          enumNames:
            - RH1 2027
            - Summit 2027
            - None
          default: rh1_2027
          ui:help: Which initiative is this content for?

        showroom_type:
          title: Showroom Type
          type: string
          enum:
            - classic
            - zero_touch
          enumNames:
            - Classic (standard Showroom)
            - Zero Touch (embedded automation)
          default: classic
          ui:help: Classic = standard Showroom lab. Zero Touch = embedded runtime/setup automation.

  steps:
    # Step 1: Check if project name is already taken
    - id: check-catalog
      name: Check Project Name Availability
      action: catalog:fetch
      input:
        entityRef: component:default/${{ parameters.project_name }}
        optional: true

    # Step 2: Render skeleton artifacts into workspace
    - id: generate-skeleton
      name: Generate Skeleton Artifacts
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: fetch:template
      input:
        url: ./skeleton
        values:
          project_name: ${{ parameters.project_name }}
          project_description: ${{ parameters.project_description }}
          content_type: ${{ parameters.content_type }}
          deployment_mode: ${{ parameters.deployment_mode }}
          github_user: ${{ parameters.github_users[0].user }}
          user_email: ${{ user.entity.spec.profile.email }}
          repo_url: https://github.com/rhpds/${{ parameters.project_name }}
          initiative_key: ${{ parameters.initiative_key }}
          showroom_type: ${{ parameters.showroom_type }}
          devspaces_url: https://devspaces.${{ environment.parameters.baseDomain }}
          central_api_url: https://central-api-publishing-house.${{ environment.parameters.baseDomain }}
          created_at: '${{ execution.datetime }}'

    # Step 3: Create repo from GitHub template, overlay skeleton, commit and push
    - id: create-and-push
      name: Create Repository & Push Skeleton
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: github:repo:create-from-template
      input:
        repoUrl: github.com?owner=rhpds&repo=${{ parameters.project_name }}
        templateRepo: rhpds/rhdp-publishing-house-template
        description: ${{ parameters.project_description }}
        defaultBranch: main
        repoVisibility: public
        gitCommitMessage: "Add templated skeleton artifacts"
        collaborators: ${{ parameters.github_users }}

    # Step 4: Trigger workflow via RHDH proxy
    - id: trigger-workflow
      name: Start Publishing House Workflow
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: http:backstage:request
      input:
        method: POST
        path: '/proxy/sonataflow/publishinghouseworkflow?businessKey=${{ parameters.project_name }}'
        headers:
          content-type: 'application/json'
        body:
          projectId: ${{ parameters.project_name }}
          repoUrl: https://github.com/rhpds/${{ parameters.project_name }}
          ssoUser: ${{ user.entity.metadata.name }}
          ssoEmail: ${{ user.entity.spec.profile.email }}
          deploymentMode: ${{ parameters.deployment_mode }}
          contentType: ${{ parameters.content_type }}
          tags: ${{ parameters.tags }}
          projectDescription: ${{ parameters.project_description }}
          auditTrailSha: ${{ steps['create-and-push'].output.commitHash }}

    # Step 5: Register in catalog
    - id: register
      name: Register in Backstage Catalog
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-and-push'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Open Repository
        icon: github
        url: https://github.com/rhpds/${{ parameters.project_name }}
        if: ${{ steps['check-catalog'].output.entity == null }}

      - title: View in Catalog
        icon: catalog
        url: /catalog/default/component/${{ parameters.project_name }}
        if: ${{ steps['check-catalog'].output.entity == null }}

      - title: Open in DevSpaces
        icon: launch
        url: https://devspaces.${{ environment.parameters.baseDomain }}#https://github.com/rhpds/${{ parameters.project_name }}
        if: ${{ steps['check-catalog'].output.entity == null }}

      - title: View Existing Entity in Catalog
        icon: catalog
        url: /catalog/default/component/${{ parameters.project_name }}
        if: ${{ steps['check-catalog'].output.entity != null }}

    text:
      - title: Result
        content: |
          {% if steps['check-catalog'].output.entity %}
          **Scaffolding Skipped**

          A project named **"${{ parameters.project_name }}"** already exists in the catalog. All steps were skipped — no repository was created and no workflow was started. Re-run the template with a different project name.
          {% else %}
          **Your Publishing House project is live!** You're ready to start building.

          **Here's what we set up for you:**
          1. Repository created
          2. catalog-info.yaml added to repository
          3. Registered in Backstage catalog
          4. Orchestrator workflow started — your AI-guided content pipeline is running!

          **What happens next:**
          Claude will walk you through the entire content lifecycle — from intake and spec creation, through Jira tracking and reviews, all the way to a published lab on RHDP. Just follow the prompts!

          **Getting Started:**

          **Option A — DevSpaces (recommended, fastest way to start!):**
          1. Click the **Open in DevSpaces** link above
          2. Once the workspace loads, open a new terminal
          3. Start Claude CLI: `claude`
          4. Run: `/rhdp-publishing-house` — and you're off!

          **Option B — Local machine:**
          1. Install the skills: `git clone https://github.com/rhpds/rhdp-publishing-house-skills.git ~/.claude/skills/publishing-house`
          2. Clone the repo: `git clone https://github.com/rhpds/${{ parameters.project_name }}`
          3. `cd ${{ parameters.project_name }}`
          4. Start Claude CLI: `claude`
          5. Run: `/rhdp-publishing-house` — and you're off!
          {% endif %}
