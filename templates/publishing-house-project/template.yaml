apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: publishing-house-project
  title: Publishing House Content Project
  description: Create a new PH content project with orchestrated workflow
  tags:
    - publishing-house
    - workshop
    - devspaces

spec:
  owner: rhdp-team
  type: service

  parameters:
    - title: Project Details
      required:
        - project_name
        - project_description
        - content_type
        - deployment_mode
      properties:
        project_name:
          title: Project Name
          type: string
          description: Name for your workshop/lab/demo (letters and hyphens only)
          ui:autofocus: true
          ui:placeholder: "openshift-ai-workshop"
          pattern: '^[a-z0-9-]+$'
          ui:help: Use lowercase letters, numbers, and hyphens only

        project_description:
          title: Project Description
          type: string
          description: Brief overview of what this project will deliver
          ui:widget: textarea
          ui:options:
            rows: 3
          ui:placeholder: "A hands-on workshop teaching developers how to deploy and manage AI workloads on OpenShift using RHOAI"

        content_type:
          title: Content Type
          type: string
          enum: [workshop, lab, demo]
          default: workshop

        deployment_mode:
          title: Deployment Mode
          type: string
          enum:
            - rhdp_published
            - self_published
          enumNames:
            - RHDP Published (full gates, reviewer required)
            - Self-Published (self-approval allowed)
          default: rhdp_published
          ui:help: Choose review rigor level

        tags:
          title: Tags
          type: array
          ui:options:
            addable: true
            orderable: false
            removable: true
          items:
            type: string
            title: Tag
            ui:placeholder: "e.g. LB1234, openshift, ansible"
          ui:help: "e.g. LB1234, openshift, ansible"

    - title: GitHub Collaborators
      required:
        - github_users
      properties:
        github_users:
          title: GitHub Users
          type: array
          minItems: 1
          ui:options:
            addable: true
            orderable: false
            removable: true
          items:
            type: object
            required:
              - user
            properties:
              user:
                title: GitHub Username
                type: string
                ui:placeholder: "github-username"
              access:
                title: Access
                type: string
                default: write
                ui:widget: hidden

    - title: Initiative & Content Format
      required:
        - initiative_key
        - showroom_type
      properties:
        initiative_key:
          title: Initiative
          type: string
          enum:
            - rh1_2027
            - summit_2027
            - none
          enumNames:
            - RH1 2027
            - Summit 2027
            - None
          default: rh1_2027
          ui:help: Which initiative is this content for?

        showroom_type:
          title: Showroom Type
          type: string
          enum:
            - classic
            - zero_touch
          enumNames:
            - Classic (standard Showroom)
            - Zero Touch (embedded automation)
          default: classic
          ui:help: Classic = standard Showroom lab. Zero Touch = embedded runtime/setup automation.

  steps:
    # Step 1: Check if project name is already taken
    - id: check-catalog
      name: Check Project Name Availability
      action: catalog:fetch
      input:
        entityRef: component:default/${{ parameters.project_name }}
        optional: true

    # Step 2: Fetch template
    - id: fetch-template
      name: Fetch Publishing House Template
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: fetch:template
      input:
        url: https://github.com/rhpds/rhdp-publishing-house-template/tree/rearchitecture
        values:
          project_name: ${{ parameters.project_name }}
          project_description: ${{ parameters.project_description }}
          content_type: ${{ parameters.content_type }}
          deployment_mode: ${{ parameters.deployment_mode }}
          github_user: ${{ parameters.github_users[0].user }}
          user_email: ${{ user.entity.spec.profile.email }}

    # Step 3: Add catalog-info to workspace
    - id: fetch-catalog-info
      name: Add catalog-info.yaml
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: fetch:template
      input:
        url: ./skeleton
        values:
          project_name: ${{ parameters.project_name }}
          project_description: ${{ parameters.project_description }}
          content_type: ${{ parameters.content_type }}
          deployment_mode: ${{ parameters.deployment_mode }}
          github_user: ${{ parameters.github_users[0].user }}
          user_email: ${{ user.entity.spec.profile.email }}
          repo_url: https://github.com/rhpds/${{ parameters.project_name }}
          initiative_key: ${{ parameters.initiative_key }}
          showroom_type: ${{ parameters.showroom_type }}
          devspaces_url: https://devspaces.${{ environment.parameters.baseDomain }}
          central_api_url: https://central-api-publishing-house.${{ environment.parameters.baseDomain }}

    # Step 4: Publish to GitHub with catalog-info included
    - id: publish
      name: Create GitHub Repository
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: publish:github
      input:
        repoUrl: github.com?owner=rhpds&repo=${{ parameters.project_name }}
        description: ${{ parameters.project_description }}
        defaultBranch: main
        repoVisibility: public
        protectDefaultBranch: false
        collaborators: ${{ parameters.github_users }}

    # Step 5: Trigger workflow via RHDH proxy
    - id: trigger-workflow
      name: Start Publishing House Workflow
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: http:backstage:request
      input:
        method: POST
        path: '/proxy/sonataflow/publishinghouseworkflow?businessKey=${{ parameters.project_name }}'
        headers:
          content-type: 'application/json'
        body:
          projectId: ${{ parameters.project_name }}
          repoUrl: ${{ steps.publish.output.remoteUrl }}
          ssoUser: ${{ user.entity.metadata.name }}
          ssoEmail: ${{ user.entity.spec.profile.email }}
          deploymentMode: ${{ parameters.deployment_mode }}
          contentType: ${{ parameters.content_type }}
          tags: ${{ parameters.tags }}
          projectDescription: ${{ parameters.project_description }}
          auditTrailSha: ${{ steps.publish.output.commitHash }}

    # Step 6: Register in catalog
    - id: register
      name: Register in Backstage Catalog
      if: ${{ steps['check-catalog'].output.entity == null }}
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

    # Step 7: Warning if project name was already taken
    - id: name-taken-warning
      name: Project Name Already Exists
      if: ${{ steps['check-catalog'].output.entity != null }}
      action: debug:log
      input:
        message: |
          ===================================================================
          WARNING: SCAFFOLDING SKIPPED!

          A project named "${{ parameters.project_name }}" already exists in the catalog.
          No repository was created and no workflow was started.

          Click "Start Over" below to go back and choose a different project name.
          ===================================================================

  output:
    links:
      - title: View Repository
        icon: github
        url: ${{ steps.publish.output.remoteUrl }}
        if: ${{ steps['check-catalog'].output.entity == null }}

      - title: View in Catalog
        icon: catalog
        url: /catalog/default/component/${{ parameters.project_name }}
        if: ${{ steps['check-catalog'].output.entity == null }}

      - title: Open in DevSpaces
        icon: launch
        url: https://devspaces.${{ environment.parameters.baseDomain }}#https://github.com/rhpds/${{ parameters.project_name }}
        if: ${{ steps['check-catalog'].output.entity == null }}

      - title: View Existing Project in Catalog
        icon: catalog
        url: /catalog/default/component/${{ parameters.project_name }}
        if: ${{ steps['check-catalog'].output.entity != null }}

    text:
      - title: Status
        content: >-
          ${{ steps['check-catalog'].output.entity == null
            ? '🎉 **Your Publishing House project is live!** You are ready to start building.


          **Here is what we set up for you:**

          1. ✅ Repository created at ' + steps.publish.output.remoteUrl + '

          2. ✅ catalog-info.yaml added to repository

          3. ✅ Registered in Backstage catalog

          4. ✅ Orchestrator workflow started — your AI-guided content pipeline is running!


          **🚀 Getting Started:**


          **Option A — DevSpaces (recommended, fastest way to start!):**

          1. Click the **Open in DevSpaces** link above

          2. Once the workspace loads, open a new terminal

          3. Start Claude CLI: `claude`

          4. Run: `/rhdp-publishing-house` — and you are off!


          **Option B — Local machine:**

          1. Install the skills: `git clone https://github.com/rhpds/rhdp-publishing-house-skills.git ~/.claude/skills/publishing-house`

          2. Clone the repo: `git clone ' + steps.publish.output.remoteUrl + '`

          3. `cd ' + parameters.project_name + '`

          4. Start Claude CLI: `claude`

          5. Run: `/rhdp-publishing-house` — and you are off!'
            : '⚠️ **Scaffolding skipped!** A project named "' + parameters.project_name + '" already exists in the catalog. No repository was created and no workflow was started. Click **Start Over** below to choose a different project name.' }}
